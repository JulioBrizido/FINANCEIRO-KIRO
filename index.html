<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financeiro Fácil — Lançamentos</title>
  <style>
    :root {
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#6c63ff;
      --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;
      --muted:#94a3b8;--border:#2d3148;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center}
    nav .brand{font-size:1.2rem;font-weight:700;padding:1rem 1.5rem 1rem 0;color:var(--text)}
    nav .brand span{color:var(--accent)}
    nav a{color:var(--muted);text-decoration:none;padding:1rem 1.25rem;font-size:.9rem;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
    nav a:hover{color:var(--text)}
    nav a.active{color:var(--accent);border-bottom-color:var(--accent)}
    .nav-version{margin-left:auto;font-size:.75rem;color:var(--muted);padding:.3rem .75rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;white-space:nowrap}
    .main{padding:2rem;max-width:1100px;margin:0 auto}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem 2rem;margin-bottom:1.5rem}
    .form-card h2{font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1.25rem}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
    .form-group{display:flex;flex-direction:column;gap:.4rem}
    .form-group label{font-size:.8rem;color:var(--muted)}
    .form-group input,.form-group select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.55rem .85rem;font-size:.95rem;outline:none;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
    .form-actions{display:flex;gap:.75rem;margin-top:1.25rem;flex-wrap:wrap}
    .btn{padding:.55rem 1.4rem;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-success{background:var(--green);color:#fff}
    .btn-danger{background:var(--red);color:#fff}
    .btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
    .btn:hover{opacity:.85}
    .toggle-mov{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);width:fit-content}
    .tog-btn{background:var(--surface2);color:var(--muted);border:none;padding:.5rem 1.25rem;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s,color .2s}
    .tog-btn.active-saida{background:#ef444422;color:var(--red)}
    .tog-btn.active-entrada{background:#22c55e22;color:var(--green)}
    .tog-btn:not([class*="active"]):hover{background:var(--border)}
    #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green);color:#fff;padding:.7rem 1.4rem;border-radius:10px;font-size:.9rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999}
    #toast.show{opacity:1}
    #toast.error{background:var(--red)}
    .filter-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
    .filter-row label{font-size:.85rem;color:var(--muted)}
    .filter-row select,.filter-row input[type=search]{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.4rem .8rem;font-size:.9rem;outline:none}
    .filter-row input[type=search]:focus,.filter-row select:focus{border-color:var(--accent)}
    .filter-row input[type=search]{min-width:200px}
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;overflow-x:auto}
    .table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem}
    .table-header h2{font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .io-row{display:flex;gap:.5rem;flex-wrap:wrap}
    table{width:100%;border-collapse:collapse;font-size:.88rem}
    th{color:var(--muted);font-weight:600;text-align:left;padding:.5rem .75rem;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:.5rem .75rem;border-bottom:1px solid var(--border)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--surface2)}
    .badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.75rem;font-weight:600}
    .btn-icon{background:none;border:none;cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:6px;transition:background .2s}
    .btn-icon:hover{background:var(--surface2)}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.95rem}
    .empty-state .icon{font-size:2.5rem;margin-bottom:.5rem}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem 2rem;width:100%;max-width:520px;transform:translateY(20px);transition:transform .2s}
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal h2{font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1.25rem}
    #importFile{display:none}
    .summary-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .summary-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.5rem 1rem;font-size:.85rem;color:var(--muted)}
    .summary-pill strong{color:var(--text)}
    /* ── SELEÇÃO ── */
    input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
    tr.selecionada td{background:var(--surface2)!important;outline:1px solid var(--accent)}
    .sel-bar{display:none;align-items:center;gap:1rem;background:#6c63ff18;border:1px solid var(--accent);
             border-radius:10px;padding:.6rem 1rem;margin-bottom:1rem;flex-wrap:wrap}
    .sel-bar.visible{display:flex}
    .sel-bar span{font-size:.9rem;color:var(--accent);font-weight:600}
    .btn:disabled{opacity:.35;cursor:not-allowed}
  </style>
</head>
<body>
<nav>
  <div class="brand"><img src="icon.png" style="height:32px;width:32px;object-fit:contain;vertical-align:middle;margin-right:.4rem;border-radius:6px"> Financeiro <span>Fácil</span></div>
  <a href="index.html" class="active">Lançamentos</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="config.html">Configurações</a>
  <span class="nav-version">v1.0.9</span>
</nav>
<div class="main">
  <div class="form-card">
    <h2 id="formTitle">➕ Novo Lançamento</h2>
    <div class="form-grid">
      <div class="form-group" style="grid-column:span 2">
        <label>Movimento</label>
        <div class="toggle-mov" id="toggleMov">
          <button type="button" id="togSaida"   onclick="setMov('saida')">📤 Saída</button>
          <button type="button" id="togEntrada" onclick="setMov('entrada')">📥 Entrada</button>
        </div>
        <input type="hidden" id="fMov" value="saida"/>
      </div>
      <div class="form-group">
        <label for="fCartao">Cartão / Conta</label>
        <select id="fCartao"></select>
      </div>
      <div class="form-group">
        <label for="fMes">Mês</label>
        <select id="fMes">
          <option value="0">Janeiro</option><option value="1">Fevereiro</option>
          <option value="2">Março</option><option value="3">Abril</option>
          <option value="4">Maio</option><option value="5">Junho</option>
          <option value="6">Julho</option><option value="7">Agosto</option>
          <option value="8">Setembro</option><option value="9">Outubro</option>
          <option value="10">Novembro</option><option value="11">Dezembro</option>
        </select>
      </div>
      <div class="form-group">
        <label for="fAno">Ano</label>
        <select id="fAno"></select>
      </div>
      <div class="form-group" style="grid-column:span 2">
        <label for="fDesc">Descrição</label>
        <input id="fDesc" type="text" placeholder="Ex: Supermercado Extra" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="fTipo">Categoria</label>
        <select id="fTipo"></select>
      </div>
      <div class="form-group">
        <label for="fVenc">Vencimento (dia)</label>
        <input id="fVenc" type="text" placeholder="Ex: 10" maxlength="10"/>
      </div>
      <div class="form-group">
        <label for="fValor">Valor (R$)</label>
        <input id="fValor" type="number" min="0.01" step="0.01" placeholder="0,00"/>
      </div>
      <div class="form-group" id="grupoParc">
        <label for="fParc">Parcelas</label>
        <input id="fParc" type="number" min="1" max="48" step="1" value="1"/>
        <span id="previewParc" style="font-size:.75rem;color:var(--muted);margin-top:.2rem;min-height:1rem"></span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="salvarLancamento()">Salvar</button>
      <button class="btn btn-ghost" onclick="limparForm()" id="btnCancelar" style="display:none">Cancelar</button>
    </div>
  </div>
  <div class="summary-bar" id="summaryBar"></div>

  <!-- barra de seleção múltipla -->
  <div class="sel-bar" id="selBar">
    <span id="selCount">0 selecionados</span>
    <button class="btn btn-ghost" id="btnAlterarCat" onclick="abrirAlterarCategoria()" disabled title="Selecione lançamentos do mesmo tipo (só saída ou só entrada)">🏷 Alterar categoria</button>
    <button class="btn btn-ghost" onclick="exportarSelecionados()">⬇ Exportar selecionados</button>
    <button class="btn btn-ghost" onclick="abrirRelatorio()">📄 Relatório</button>
    <button class="btn btn-danger" onclick="excluirSelecionados()">🗑 Excluir selecionados</button>
    <button class="btn btn-ghost"  onclick="limparSelecao()">Cancelar</button>
  </div>
  <div class="filter-row">
    <label>Movimento:</label>
    <select id="filtroMov">
      <option value="todos">Todos</option>
      <option value="saida">Saída</option>
      <option value="entrada">Entrada</option>
    </select>
    <label>Mês:</label>
    <select id="filtroMes">
      <option value="-1">Todos</option>
      <option value="0">Janeiro</option><option value="1">Fevereiro</option>
      <option value="2">Março</option><option value="3">Abril</option>
      <option value="4">Maio</option><option value="5">Junho</option>
      <option value="6">Julho</option><option value="7">Agosto</option>
      <option value="8">Setembro</option><option value="9">Outubro</option>
      <option value="10">Novembro</option><option value="11">Dezembro</option>
    </select>
    <label>Ano:</label>
    <select id="filtroAno"><option value="-1">Todos</option></select>
    <label>Conta:</label>
    <select id="filtroCartao">
      <option value="todos">Todos</option>
    </select>
    <label>Categoria:</label>
    <select id="filtroTipo"><option value="todos">Todas</option></select>
    <input type="search" id="filtroBusca" placeholder="Buscar descrição…"/>
  </div>
  <div class="table-card">
    <div class="table-header">
      <h2>Transações</h2>
      <div class="io-row">
        <button class="btn btn-ghost" onclick="exportarJSON()">⬇ Backup</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">⬆ Importar JSON</button>
        <input type="file" id="importFile" accept=".json" onchange="handleImport(event)"/>
        <button class="btn btn-danger" onclick="confirmarLimpar()">🗑 Limpar tudo</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="chkTodos" title="Selecionar todos" onchange="toggleTodos(this.checked)"/></th>
          <th>Mov.</th><th>Conta</th><th>Ano</th><th>Mês</th><th>Descrição</th>
          <th>Categoria</th><th>Venc</th>
          <th style="text-align:right">Valor</th>
          <th style="text-align:center">Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">📭</div><p>Nenhum lançamento encontrado.</p>
    </div>
  </div>
</div>
<!-- Modal alterar categoria -->
<div class="modal-overlay" id="modalCatOverlay">
  <div class="modal">
    <h2 id="modalCatTitle">🏷 Alterar Categoria</h2>
    <p id="modalCatInfo" style="color:var(--muted);font-size:.85rem;margin-bottom:1rem"></p>
    <div class="form-group" style="margin-bottom:1.5rem">
      <label for="selNovaCat" style="font-size:.8rem;color:var(--muted)">Nova categoria</label>
      <select id="selNovaCat" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.55rem .85rem;font-size:.95rem;outline:none;margin-top:.35rem"></select>
    </div>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-primary" onclick="confirmarAlterarCategoria()">Aplicar</button>
      <button class="btn btn-ghost"   onclick="fecharModalCat()">Cancelar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Confirmar</h2>
    <p id="modalMsg" style="color:var(--muted);margin-bottom:1.5rem;font-size:.95rem"></p>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-danger" id="modalConfirm">Confirmar</button>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Modal Relatório -->
<div class="modal-overlay" id="modalRelOverlay">
  <div class="modal" style="max-width:640px;max-height:85vh;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <h2 style="margin:0">📄 Relatório de Lançamentos</h2>
      <button class="btn btn-ghost" style="padding:.3rem .8rem" onclick="imprimirRelatorio()">🖨 Imprimir</button>
    </div>
    <div id="relConteudo" style="overflow-y:auto;flex:1"></div>
    <div style="margin-top:1.25rem;display:flex;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="fecharRelatorio()">Fechar</button>
    </div>
  </div>
</div>
<script src="db.js"></script>
<script>
const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];


// ── CATEGORIAS DINÂMICAS (cores do banco) ────────────────────────────────

let _cats = []; // cache de categorias

async function carregarCats() {
  _cats = await catsGetAll();
}

function corTipo(tipo, mov) {
  const cat = _cats.find(c => c.nome === tipo && c.mov === mov)
           || _cats.find(c => c.nome === tipo);
  return cat ? cat.cor : '#94a3b8';
}

let editandoId = null;

// ── CONTAS DINÂMICAS ─────────────────────────────────────────────────────

let _contas = []; // cache

async function carregarContas() {
  _contas = await contasGetAll();

  // Preenche select do formulário
  const sel = document.getElementById('fCartao');
  const valAtual = sel.value;
  sel.innerHTML = _contas.map(c =>
    '<option value="' + c.nome + '"' + (c.nome === valAtual ? ' selected' : '') + '>' + c.nome + '</option>'
  ).join('');

  // Preenche filtro da tabela
  const filtro = document.getElementById('filtroCartao');
  const filtroAtual = filtro.value;
  filtro.innerHTML = '<option value="todos">Todos</option>' +
    _contas.map(c =>
      '<option value="' + c.nome + '"' + (c.nome === filtroAtual ? ' selected' : '') + '>' + c.nome + '</option>'
    ).join('');
}

function contaNome(mov) {
  // Padrão ao trocar movimento: primeira carteira para entrada, primeiro cartão para saída
  if (mov === 'entrada') {
    const c = _contas.find(c => c.tipo === 'carteira' || c.tipo === 'conta') || _contas[0];
    return c ? c.nome : '';
  }
  const c = _contas.find(c => c.tipo === 'cartao') || _contas[0];
  return c ? c.nome : '';
}

// ── TOGGLE MOVIMENTO ─────────────────────────────────────────────────────
function setMov(mov) {
  document.getElementById('fMov').value = mov;
  const s = document.getElementById('togSaida');
  const e = document.getElementById('togEntrada');
  s.className = 'tog-btn' + (mov === 'saida'   ? ' active-saida'   : '');
  e.className = 'tog-btn' + (mov === 'entrada' ? ' active-entrada' : '');
  preencherCats(mov);
  document.getElementById('fCartao').value = contaNome(mov);
  document.getElementById('grupoParc').style.display = mov === 'saida' ? 'flex' : 'none';
}

function preencherCats(mov, valorAtual) {
  catsGetAll().then(todas => {
    const cats = todas.filter(c => c.mov === mov);
    const sel  = document.getElementById('fTipo');
    sel.innerHTML = cats.map(c =>
      '<option' + (c.nome === valorAtual ? ' selected' : '') + '>' + c.nome + '</option>'
    ).join('');
  });
}

function preencherFiltroTipo() {
  catsGetAll().then(todas => {
    const sorted = [...todas].sort((a, b) => a.nome.localeCompare(b.nome));
    const sel = document.getElementById('filtroTipo');
    sel.innerHTML = '<option value="todos">Todas</option>' +
      sorted.map(c => '<option>' + c.nome + '</option>').join('');
  });
}

// ── FORM ──────────────────────────────────────────────────────────────────
function limparForm(manterContexto = false) {
  // Captura contexto atual ANTES de qualquer alteração
  const movAtual    = document.getElementById('fMov').value;
  const cartaoAtual = document.getElementById('fCartao').value;
  const mesAtual    = document.getElementById('fMes').value;
  const anoAtual    = document.getElementById('fAno').value;

  editandoId = null;
  document.getElementById('formTitle').textContent = '➕ Novo Lançamento';
  document.getElementById('fDesc').value  = '';
  document.getElementById('fValor').value = '';
  document.getElementById('fVenc').value  = '';
  document.getElementById('fParc').value  = '1';
  document.getElementById('btnCancelar').style.display = 'none';
  document.getElementById('grupoParc').style.display   = 'flex';

  if (manterContexto) {
    // Restaura movimento (sem chamar setMov para não sobrescrever cartão/cats)
    document.getElementById('fMov').value = movAtual;
    const s = document.getElementById('togSaida');
    const e = document.getElementById('togEntrada');
    s.className = 'tog-btn' + (movAtual === 'saida'   ? ' active-saida'   : '');
    e.className = 'tog-btn' + (movAtual === 'entrada' ? ' active-entrada' : '');
    preencherCats(movAtual);
    document.getElementById('fCartao').value = cartaoAtual;
    document.getElementById('fMes').value    = mesAtual;
    document.getElementById('fAno').value    = anoAtual;
    document.getElementById('grupoParc').style.display = movAtual === 'saida' ? 'flex' : 'none';
  } else {
    setMov('saida');
    document.getElementById('fMes').value = new Date().getMonth();
    document.getElementById('fAno').value = new Date().getFullYear();
  }

  atualizarPreviewParc();
}

async function salvarLancamento() {
  const mov    = document.getElementById('fMov').value;
  const cartao = document.getElementById('fCartao').value;
  const mesIdx = parseInt(document.getElementById('fMes').value);
  const ano    = parseInt(document.getElementById('fAno').value);
  const desc   = document.getElementById('fDesc').value.trim();
  const tipo   = document.getElementById('fTipo').value;
  const venc   = document.getElementById('fVenc').value.trim();
  const valor  = parseFloat(document.getElementById('fValor').value);
  const parc   = parseInt(document.getElementById('fParc').value) || 1;

  if (!desc)                return toast('Informe a descrição.', true);
  if (!valor || valor <= 0) return toast('Informe um valor válido.', true);

  if (editandoId !== null) {
    await dbUpdate({ id: editandoId, mov, cartao, ano, mesIdx, mes: MESES_PT[mesIdx],
                     descricao: desc, tipo, venc, valor });
    toast('Lançamento atualizado!');
    limparForm();
    await renderTabela();
    return;
  }

  if (parc <= 1 || mov === 'entrada') {
    await dbAdd({ mov, cartao, ano, mesIdx, mes: MESES_PT[mesIdx],
                  descricao: desc, tipo, venc, valor });
    toast('Lançamento salvo!');
  } else {
    const vp = Math.round((valor / parc) * 100) / 100;
    for (let i = 0; i < parc; i++) {
      const mi    = (mesIdx + i) % 12;
      // Avança o ano quando o mês passa de dezembro
      const avancoAno = Math.floor((mesIdx + i) / 12);
      await dbAdd({ mov, cartao, ano: ano + avancoAno, mesIdx: mi, mes: MESES_PT[mi],
                    descricao: desc + ' (' + (i+1) + '/' + parc + ')',
                    tipo, venc, valor: vp });
    }
    toast('✅ ' + parc + ' parcelas lançadas (' + fmt(vp) + '/mês)');
  }
  limparForm(true);
  await renderTabela();
}

// ── EDITAR / EXCLUIR ──────────────────────────────────────────────────────
async function editarLancamento(id) {
  const todos = await dbGetAll();
  const t = todos.find(x => x.id === id);
  if (!t) return;
  editandoId = id;
  const mov = t.mov || 'saida';
  document.getElementById('formTitle').textContent = '✏️ Editar Lançamento';
  setMov(mov);
  preencherCats(mov, t.tipo);
  document.getElementById('fCartao').value = t.cartao;
  document.getElementById('fMes').value    = t.mesIdx;
  document.getElementById('fAno').value    = t.ano || new Date().getFullYear();
  document.getElementById('fDesc').value   = t.descricao;
  document.getElementById('fVenc').value   = t.venc || '';
  document.getElementById('fValor').value  = t.valor;
  document.getElementById('btnCancelar').style.display = 'inline-block';
  document.getElementById('grupoParc').style.display   = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function excluirLancamento(id) {
  abrirModal('Excluir lançamento',
    'Tem certeza? Esta ação não pode ser desfeita.',
    async () => { await dbDelete(id); toast('Lançamento excluído.'); await renderTabela(); });
}

function confirmarLimpar() {
  abrirModal('Limpar todos os dados',
    'Isso vai apagar TODOS os lançamentos, contas e categorias permanentemente.',
    async () => {
      await limparTudo();
      toast('Dados apagados.');
      await carregarContas();
      await carregarCats();
      preencherFiltroTipo();
      await renderTabela();
    });
}

// ── RENDER ────────────────────────────────────────────────────────────────
function fmt(v) {
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

async function renderTabela() {
  await carregarCats(); // garante cores atualizadas do banco
  const todos   = await dbGetAll();
  const movF    = document.getElementById('filtroMov').value;
  const mesF    = parseInt(document.getElementById('filtroMes').value);
  const anoF    = parseInt(document.getElementById('filtroAno').value);
  const cartaoF = document.getElementById('filtroCartao').value;
  const tipoF   = document.getElementById('filtroTipo').value;
  const busca   = document.getElementById('filtroBusca').value.toLowerCase().trim();

  // Atualiza lista de anos disponíveis
  const anosDisp = [...new Set(todos.map(t => t.ano).filter(Boolean))].sort((a,b) => b - a);
  const filtroAnoEl = document.getElementById('filtroAno');
  const anoSelecionado = filtroAnoEl.value !== '' ? filtroAnoEl.value : String(new Date().getFullYear());
  filtroAnoEl.innerHTML = '<option value="-1">Todos</option>' +
    anosDisp.map(a => '<option value="' + a + '"' + (String(a) === anoSelecionado ? ' selected' : '') + '>' + a + '</option>').join('');
  // Se o valor selecionado não existe nas opções, tenta selecionar o ano atual
  if (!filtroAnoEl.value || filtroAnoEl.value === '-1' && anoSelecionado !== '-1') {
    const anoAtualStr = String(new Date().getFullYear());
    if (anosDisp.map(String).includes(anoAtualStr)) filtroAnoEl.value = anoAtualStr;
  }

  let lista = todos;
  if (movF    !== 'todos') lista = lista.filter(t => (t.mov||'saida') === movF);
  if (mesF    !== -1)      lista = lista.filter(t => t.mesIdx === mesF);
  if (anoF    !== -1)      lista = lista.filter(t => (t.ano || 0) === anoF);
  if (cartaoF !== 'todos') lista = lista.filter(t => t.cartao === cartaoF);
  if (tipoF   !== 'todos') {
    const [catMov, catNome] = tipoF.split('|');
    lista = lista.filter(t => t.tipo === catNome && (t.mov || 'saida') === catMov);
  }
  if (busca)               lista = lista.filter(t => t.descricao.toLowerCase().includes(busca));

  lista.sort((a, b) => {
    const ma = a.mov||'saida', mb = b.mov||'saida';
    if (ma !== mb) return ma === 'entrada' ? -1 : 1;
    // Ordena por ano desc, depois mês desc, depois valor desc
    if ((b.ano||0) !== (a.ano||0)) return (b.ano||0) - (a.ano||0);
    if (b.mesIdx !== a.mesIdx) return b.mesIdx - a.mesIdx;
    return b.valor - a.valor;
  });

  const entradas = lista.filter(t => t.mov === 'entrada').reduce((s,t)=>s+t.valor,0);
  const saidas   = lista.filter(t => (t.mov||'saida') === 'saida').reduce((s,t)=>s+t.valor,0);
  const saldo    = entradas - saidas;
  document.getElementById('summaryBar').innerHTML = [
    '<div class="summary-pill">Entradas: <strong style="color:var(--green)">' + fmt(entradas) + '</strong></div>',
    '<div class="summary-pill">Saídas: <strong style="color:var(--red)">'    + fmt(saidas)   + '</strong></div>',
    '<div class="summary-pill">Saldo: <strong style="color:' + (saldo>=0?'var(--green)':'var(--red)') + '">' + fmt(Math.abs(saldo)) + '</strong></div>',
    '<div class="summary-pill">Registros: <strong>' + lista.length + '</strong></div>',
  ].join('');

  const tbody = document.getElementById('tabelaBody');
  const empty = document.getElementById('emptyState');
  if (lista.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = lista.map(t => {
    const mov = t.mov || 'saida';
    const cor = corTipo(t.tipo, mov);
    const icon = mov === 'entrada' ? '📥' : '📤';
    const vc   = mov === 'entrada' ? 'var(--green)' : 'var(--red)';
    return '<tr data-id="' + t.id + '" data-mov="' + mov + '">' +
      '<td><input type="checkbox" class="chk-linha" data-id="' + t.id + '" onchange="onCheckLinha()"/></td>' +
      '<td style="font-size:1rem">' + icon + '</td>' +
      '<td>' + t.cartao + '</td>' +
      '<td>' + (t.ano || '—') + '</td>' +
      '<td>' + t.mes + '</td>' +
      '<td>' + t.descricao + '</td>' +
      '<td><span class="badge" style="background:' + cor + '22;color:' + cor + '">' + t.tipo + '</span></td>' +
      '<td>' + (t.venc||'—') + '</td>' +
      '<td style="text-align:right;font-weight:600;color:' + vc + '">' + fmt(t.valor) + '</td>' +
      '<td style="text-align:center;white-space:nowrap">' +
        '<button class="btn-icon" onclick="editarLancamento(' + t.id + ')">✏️</button>' +
        '<button class="btn-icon" onclick="excluirLancamento(' + t.id + ')">🗑️</button>' +
      '</td></tr>';
  }).join('');
  // Reseta checkbox do cabeçalho e barra de seleção ao re-renderizar
  document.getElementById('chkTodos').checked = false;
  atualizarSelBar();
}

// ── SELEÇÃO MÚLTIPLA ─────────────────────────────────────────────────────

function idsSelecionados() {
  return [...document.querySelectorAll('.chk-linha:checked')].map(c => parseInt(c.dataset.id));
}

function atualizarSelBar() {
  const ids = idsSelecionados();
  const bar = document.getElementById('selBar');
  bar.classList.toggle('visible', ids.length > 0);
  document.getElementById('selCount').textContent = ids.length + ' selecionado' + (ids.length !== 1 ? 's' : '');

  // Destaca linhas selecionadas
  document.querySelectorAll('#tabelaBody tr').forEach(tr => {
    const chk = tr.querySelector('.chk-linha');
    tr.classList.toggle('selecionada', chk && chk.checked);
  });

  // Atualiza estado do checkbox do cabeçalho
  const todos = document.querySelectorAll('.chk-linha');
  const chkTodos = document.getElementById('chkTodos');
  if (todos.length === 0) { chkTodos.checked = false; chkTodos.indeterminate = false; }
  else if (ids.length === 0)              { chkTodos.checked = false; chkTodos.indeterminate = false; }
  else if (ids.length === todos.length)   { chkTodos.checked = true;  chkTodos.indeterminate = false; }
  else                                    { chkTodos.checked = false; chkTodos.indeterminate = true; }

  // Habilita "Alterar categoria" só se todos os selecionados forem do mesmo movimento
  const btnCat = document.getElementById('btnAlterarCat');
  if (ids.length === 0) {
    btnCat.disabled = true;
    btnCat.title = 'Selecione lançamentos do mesmo tipo (só saída ou só entrada)';
    return;
  }
  const movimentos = new Set(
    [...document.querySelectorAll('.chk-linha:checked')]
      .map(c => c.closest('tr').dataset.mov)
  );
  const homogeneo = movimentos.size === 1;
  btnCat.disabled = !homogeneo;
  btnCat.title = homogeneo
    ? 'Alterar categoria dos ' + ids.length + ' lançamentos selecionados'
    : 'Mistura de saídas e entradas — selecione apenas um tipo';
}

function onCheckLinha() { atualizarSelBar(); }

function toggleTodos(checked) {
  document.querySelectorAll('.chk-linha').forEach(c => { c.checked = checked; });
  atualizarSelBar();
}

function limparSelecao() {
  document.querySelectorAll('.chk-linha').forEach(c => { c.checked = false; });
  document.getElementById('chkTodos').checked = false;
  atualizarSelBar();
}

function excluirSelecionados() {
  const ids = idsSelecionados();
  if (ids.length === 0) return;
  abrirModal(
    'Excluir ' + ids.length + ' lançamento' + (ids.length !== 1 ? 's' : ''),
    'Tem certeza? Esta ação não pode ser desfeita.',
    async () => {
      for (const id of ids) await dbDelete(id);
      toast(ids.length + ' lançamento' + (ids.length !== 1 ? 's excluídos' : ' excluído') + '.');
      await renderTabela();
    }
  );
}

async function exportarSelecionados() {
  const ids = idsSelecionados();
  if (ids.length === 0) return;
  const todos = await dbGetAll();
  const selecionados = todos.filter(t => ids.includes(t.id));
  const payload = { transacoes: selecionados };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `lancamentos_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('⬇ ' + ids.length + ' lançamento' + (ids.length !== 1 ? 's exportados' : ' exportado') + '.');
}

async function abrirRelatorio() {
  const ids = idsSelecionados();
  if (ids.length === 0) return;
  const todos = await dbGetAll();
  const lista = todos.filter(t => ids.includes(t.id));

  const entradas = lista.filter(t => t.mov === 'entrada');
  const saidas   = lista.filter(t => (t.mov || 'saida') === 'saida');
  const totalEnt = entradas.reduce((s, t) => s + t.valor, 0);
  const totalSai = saidas.reduce((s, t) => s + t.valor, 0);
  const saldo    = totalEnt - totalSai;

  function linhas(grupo) {
    if (grupo.length === 0) return '<tr><td colspan="2" style="color:#94a3b8;font-style:italic;padding:.5rem .75rem">Nenhum</td></tr>';
    return grupo.map(t =>
      `<tr>
        <td style="padding:.45rem .75rem;border-bottom:1px solid #2d3148">${t.descricao}</td>
        <td style="padding:.45rem .75rem;border-bottom:1px solid #2d3148;text-align:right;white-space:nowrap;font-weight:600;color:${t.mov==='entrada'?'#22c55e':'#ef4444'}">${fmt(t.valor)}</td>
      </tr>`
    ).join('');
  }

  const html = `
    <p style="font-size:.8rem;color:#94a3b8;margin-bottom:1rem">
      Gerado em ${new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'})}
      &nbsp;·&nbsp; ${ids.length} lançamento${ids.length !== 1 ? 's' : ''}
    </p>

    ${saidas.length > 0 ? `
    <p style="font-size:.75rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Saídas</p>
    <table style="width:100%;border-collapse:collapse;font-size:.88rem;margin-bottom:1.25rem">
      <thead>
        <tr>
          <th style="text-align:left;padding:.4rem .75rem;border-bottom:1px solid #2d3148;color:#94a3b8;font-weight:600">Descrição</th>
          <th style="text-align:right;padding:.4rem .75rem;border-bottom:1px solid #2d3148;color:#94a3b8;font-weight:600">Valor</th>
        </tr>
      </thead>
      <tbody>${linhas(saidas)}</tbody>
      <tfoot>
        <tr>
          <td style="padding:.5rem .75rem;font-weight:700">Total saídas</td>
          <td style="padding:.5rem .75rem;text-align:right;font-weight:700;color:#ef4444">${fmt(totalSai)}</td>
        </tr>
      </tfoot>
    </table>` : ''}

    ${entradas.length > 0 ? `
    <p style="font-size:.75rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Entradas</p>
    <table style="width:100%;border-collapse:collapse;font-size:.88rem;margin-bottom:1.25rem">
      <thead>
        <tr>
          <th style="text-align:left;padding:.4rem .75rem;border-bottom:1px solid #2d3148;color:#94a3b8;font-weight:600">Descrição</th>
          <th style="text-align:right;padding:.4rem .75rem;border-bottom:1px solid #2d3148;color:#94a3b8;font-weight:600">Valor</th>
        </tr>
      </thead>
      <tbody>${linhas(entradas)}</tbody>
      <tfoot>
        <tr>
          <td style="padding:.5rem .75rem;font-weight:700">Total entradas</td>
          <td style="padding:.5rem .75rem;text-align:right;font-weight:700;color:#22c55e">${fmt(totalEnt)}</td>
        </tr>
      </tfoot>
    </table>` : ''}

    <div style="background:#22263a;border-radius:10px;padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:700">Saldo</span>
      <span style="font-weight:700;font-size:1.05rem;color:${saldo>=0?'#22c55e':'#ef4444'}">${fmt(Math.abs(saldo))}</span>
    </div>`;

  document.getElementById('relConteudo').innerHTML = html;
  document.getElementById('modalRelOverlay').classList.add('open');
}

function fecharRelatorio() {
  document.getElementById('modalRelOverlay').classList.remove('open');
}

function imprimirRelatorio() {
  const conteudo = document.getElementById('relConteudo').innerHTML;
  const win = window.open('', '_blank', 'width=700,height=600');
  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head>

    <title>Relatório de Lançamentos</title>

document.getElementById('modalRelOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharRelatorio();
});

// ── ALTERAR CATEGORIA EM MASSA ────────────────────────────────────────────

async function abrirAlterarCategoria() {
  const ids = idsSelecionados();
  if (ids.length === 0) return;

  // Descobre o movimento dos selecionados (já garantido homogêneo pelo botão)
  const mov = [...document.querySelectorAll('.chk-linha:checked')][0]
                .closest('tr').dataset.mov || 'saida';

  // Carrega categorias do tipo correto
  const todas = await catsGetAll();
  const cats  = todas.filter(c => c.mov === mov);

  const sel = document.getElementById('selNovaCat');
  sel.innerHTML = cats.map(c =>
    '<option value="' + c.nome + '">' + c.nome + '</option>'
  ).join('');

  document.getElementById('modalCatTitle').textContent =
    '🏷 Alterar Categoria — ' + (mov === 'saida' ? 'Saída' : 'Entrada');
  document.getElementById('modalCatInfo').textContent =
    ids.length + ' lançamento' + (ids.length !== 1 ? 's' : '') + ' serão atualizados.';

  document.getElementById('modalCatOverlay').classList.add('open');
}

async function confirmarAlterarCategoria() {
  const ids      = idsSelecionados();
  const novaCat  = document.getElementById('selNovaCat').value;
  if (!novaCat || ids.length === 0) return;

  const todos = await dbGetAll();
  for (const id of ids) {
    const t = todos.find(x => x.id === id);
    if (t) await dbUpdate({ ...t, tipo: novaCat });
  }

  fecharModalCat();
  toast('✅ Categoria alterada para "' + novaCat + '" em ' + ids.length + ' lançamento' + (ids.length !== 1 ? 's' : '') + '.');
  await renderTabela();
}

function fecharModalCat() {
  document.getElementById('modalCatOverlay').classList.remove('open');
}
document.getElementById('modalCatOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModalCat();
});

// ── IMPORT / EXPORT ───────────────────────────────────────────────────────
async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const n = await importarJSON(file);
    toast(`${n.transacoes} lançamentos, ${n.contas} contas e ${n.categorias} categorias importados!`);
    await carregarContas();
    await carregarCats();
    preencherFiltroTipo();
    await renderTabela();
  }
  catch(err) { toast('Erro: ' + err.message, true); }
  e.target.value = '';
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function abrirModal(titulo, msg, onConfirm) {
  document.getElementById('modalTitle').textContent = titulo;
  document.getElementById('modalMsg').textContent   = msg;
  document.getElementById('modalConfirm').onclick   = () => { fecharModal(); onConfirm(); };
  document.getElementById('modalOverlay').classList.add('open');
}
function fecharModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModal();
});

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, erro) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (erro ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ── PREVIEW PARCELAS ─────────────────────────────────────────────────────
function atualizarPreviewParc() {
  const parc   = parseInt(document.getElementById('fParc').value) || 1;
  const valor  = parseFloat(document.getElementById('fValor').value);
  const mesIdx = parseInt(document.getElementById('fMes').value);
  const ano    = parseInt(document.getElementById('fAno').value) || new Date().getFullYear();
  const el     = document.getElementById('previewParc');
  if (parc <= 1) { el.textContent = ''; return; }
  const mesFimIdx = (mesIdx + parc - 1) % 12;
  const anoFim    = ano + Math.floor((mesIdx + parc - 1) / 12);
  const label     = MESES_PT[mesFimIdx] + '/' + anoFim;
  el.textContent = valor > 0
    ? fmt(Math.round((valor/parc)*100)/100) + '/mês · até ' + label
    : 'até ' + label;
}
['fParc','fValor','fMes','fAno'].forEach(id =>
  document.getElementById(id).addEventListener('input', atualizarPreviewParc));

// ── FILTROS ───────────────────────────────────────────────────────────────
['filtroMov','filtroMes','filtroAno','filtroCartao','filtroTipo','filtroBusca'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderTabela);
  document.getElementById(id).addEventListener('input',  renderTabela);
});
// Quando o movimento muda, repopula as categorias do filtro antes de renderizar
document.getElementById('filtroMov').addEventListener('change', preencherFiltroTipo);
document.getElementById('fMes').addEventListener('change', () => {
  document.getElementById('filtroMes').value = document.getElementById('fMes').value;
  renderTabela();
});
document.getElementById('fAno').addEventListener('change', () => {
  document.getElementById('filtroAno').value = document.getElementById('fAno').value;
  renderTabela();
});

// ── INIT ──────────────────────────────────────────────────────────────────
const mesAtual = new Date().getMonth();
const anoAtual = new Date().getFullYear();

// Popula select de anos no formulário (ano atual ± 3)
const selAno = document.getElementById('fAno');
for (let a = anoAtual + 1; a >= anoAtual - 3; a--) {
  const opt = document.createElement('option');
  opt.value = a;
  opt.textContent = a;
  if (a === anoAtual) opt.selected = true;
  selAno.appendChild(opt);
}

document.getElementById('fMes').value      = mesAtual;
document.getElementById('filtroMes').value = mesAtual;
document.getElementById('filtroAno').value = anoAtual;
carregarContas().then(async () => {
  await carregarCats();
  preencherFiltroTipo();
  setMov('saida');
  renderTabela();
});

// Ao clicar na aba Lançamentos (aba ativa), reseta filtros para mês/ano atual
document.querySelector('nav a[href="index.html"]').addEventListener('click', function(e) {
  e.preventDefault();
  document.getElementById('filtroMes').value = new Date().getMonth();
  document.getElementById('filtroAno').value = new Date().getFullYear();
  document.getElementById('filtroMov').value    = 'todos';
  document.getElementById('filtroCartao').value = 'todos';
  document.getElementById('filtroTipo').value   = 'todos';
  document.getElementById('filtroBusca').value  = '';
  preencherFiltroTipo();
  renderTabela();
});
</script>
